spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: demo1

  datasource:
    url: ${JASPER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/miniWeb}
    username: ${JASPER_DATASOURCE_USERNAME:postgres}
    password: ${JASPER_DATASOURCE_PASSWORD:123321}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://127.0.0.1:8080/realms/master}

  mail:
    host: ${APP_MAIL_HOST:smtp.gmail.com}
    port: ${APP_MAIL_PORT:587}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: ${APP_ROOM_CACHE_TTL:60s}

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://127.0.0.1:8080}
  realm: ${KEYCLOAK_REALM:master}

app:
  kafka-gateway:
    base-url: ${APP_KAFKA_GATEWAY_BASE_URL:http://localhost:8083}
  auth:
    google:
      redirect-uri: ${APP_AUTH_GOOGLE_REDIRECT_URI:http://localhost:4200/}
  keycloak:
    browser:
      client-id: ${KEYCLOAK_BROWSER_CLIENT_ID:demo-fe}
      client-secret: ${KEYCLOAK_BROWSER_CLIENT_SECRET:}
      token-uri: ${KEYCLOAK_BROWSER_TOKEN_URI:http://127.0.0.1:8080/realms/master/protocol/openid-connect/token}
      auth-uri: ${KEYCLOAK_BROWSER_AUTH_URI:http://127.0.0.1:8080/realms/master/protocol/openid-connect/auth}

    remote-federation:
      client-id: ${KEYCLOAK_REMOTE_CLIENT_ID:demo-fe}
      client-secret: ${KEYCLOAK_REMOTE_CLIENT_SECRET:${KEYCLOAK_ADMIN_CLIENT_SECRET:CR8VXD1nx7UyMHwoLUZ3X2s80bCpcJ4O}}
      token-uri: ${KEYCLOAK_REMOTE_TOKEN_URI:http://127.0.0.1:8080/realms/master/protocol/openid-connect/token}
    admin:
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:${KEYCLOAK_REMOTE_CLIENT_ID:demo-fe}}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:CR8VXD1nx7UyMHwoLUZ3X2s80bCpcJ4O}
      token-realm: ${KEYCLOAK_ADMIN_TOKEN_REALM:${KEYCLOAK_REALM:master}}

  user-storage:
    jdbc:
      url: ${USER_STORAGE_JDBC_URL:jdbc:postgresql://localhost:5432/miniWeb}
      username: ${USER_STORAGE_JDBC_USER:postgres}
      password: ${USER_STORAGE_JDBC_PASSWORD:123321}

server:
  port: ${SERVER_PORT:8082}

camunda.bpm:
  admin-user:
    id: demo
    password: demo
  filter:
    create: All tasks
  database:
    schema-update: true
  history-time-to-live: P1D

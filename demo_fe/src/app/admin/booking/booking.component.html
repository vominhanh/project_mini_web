<section class="dashboard-panel">
    <div class="metrics-grid">
        @for (metric of metrics(); track metric.label) {
        <div class="metric-card">
            <span class="label">{{ metric.label }}</span>
            <span class="value">{{ metric.value }}</span>
            <span class="note" [class.positive]="metric.color === 'positive'"
                [class.negative]="metric.color === 'negative'">{{ metric.note }}</span>
        </div>
        }
    </div>

    <div class="layout-grid">
        <div class="main-chart">
            <div class="chart-header">
                <h3>Overview</h3>
                <span class="chart-subtitle">Monthly performance for the current year</span>
            </div>
            <div class="chart-box">
                <div class="bars">
                    <div class="bar" style="height: 40%"></div>
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 30%"></div>
                    <div class="bar" style="height: 80%"></div>
                    <div class="bar" style="height: 50%"></div>
                    <div class="bar" style="height: 70%"></div>
                    <div class="bar" style="height: 90%"></div>
                </div>
            </div>
        </div>

        <div class="side-widgets">
            <div class="widget">
                <h3>Danh sách Booking mới</h3>
                <div class="booking-list">
                    @for (row of bookingRows(); track row.id) {
                    <div class="booking-item">
                        <div class="b-info">
                            <strong>{{ row.customer }}</strong>
                            <span>{{ row.service }}</span>
                        </div>
                        <div class="b-status">
                            <span>{{ row.status }}</span>
                        </div>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</section>
